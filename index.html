<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PneumoScan | AI-Assisted Chest X-Ray Analysis</title>

    <meta name="description"
        content="AI-assisted screening tool to detect pneumonia using deep learning on chest X-Ray images.">

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fafafa;
        }

        * {
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useRef } = React;

        // We run FastAPI and React on same port dynamically
        const API_BASE = "";

        const formatDate = (iso) => {
            const d = new Date(iso);
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) +
                " · " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
        };

        const ConfidenceRing = ({ value, label, color }) => {
            const r = 36, circ = 2 * Math.PI * r;
            const dash = (value / 100) * circ;
            return (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                    <svg width="90" height="90" viewBox="0 0 90 90">
                        <circle cx="45" cy="45" r={r} fill="none" stroke="#f0f0f0" strokeWidth="7" />
                        <circle cx="45" cy="45" r={r} fill="none" stroke={color} strokeWidth="7"
                            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
                            transform="rotate(-90 45 45)"
                            style={{ transition: "stroke-dasharray 1s cubic-bezier(.4,0,.2,1)" }} />
                        <text x="45" y="50" textAnchor="middle" fill="#1a1a1a"
                            style={{ fontSize: 15, fontWeight: 700, fontFamily: "inherit" }}>
                            {value}%
                        </text>
                    </svg>
                    <span style={{ fontSize: 11, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</span>
                </div>
            );
        };

        function App() {
            const [dragging, setDragging] = useState(false);
            const [preview, setPreview] = useState(null);
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [history, setHistory] = useState([]);
            const [activeTab, setActiveTab] = useState("scan");
            const [historyLoaded, setHistoryLoaded] = useState(false);
            const inputRef = useRef();

            const handleFile = (f) => {
                if (!f || !f.type.startsWith("image/")) { setError("Please upload a valid image file."); return; }
                setFile(f);
                setResult(null);
                setError(null);
                const reader = new FileReader();
                reader.onload = (e) => setPreview(e.target.result);
                reader.readAsDataURL(f);
            };

            const onDrop = useCallback((e) => {
                e.preventDefault(); setDragging(false);
                handleFile(e.dataTransfer.files[0]);
            }, []);

            const onDragOver = (e) => { e.preventDefault(); setDragging(true); };
            const onDragLeave = () => setDragging(false);

            const analyze = async () => {
                if (!file) return;
                setLoading(true); setError(null); setResult(null);
                try {
                    const form = new FormData();
                    form.append("file", file);
                    const res = await fetch(`${API_BASE}/predict`, { method: "POST", body: form });
                    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || "Server error"); }
                    const data = await res.json();
                    setResult(data);
                } catch (e) {
                    setError(e.message || "Could not connect to the server.");
                } finally { setLoading(false); }
            };

            const loadHistory = async () => {
                try {
                    const res = await fetch(`${API_BASE}/history`);
                    const data = await res.json();
                    setHistory(data);
                    setHistoryLoaded(true);
                } catch { setHistory([]); setHistoryLoaded(true); }
            };

            const deleteRecord = async (id) => {
                try {
                    await fetch(`${API_BASE}/history/${id}`, { method: "DELETE" });
                    setHistory(h => h.filter(x => x.id !== id));
                } catch { }
            };

            const switchTab = (tab) => {
                setActiveTab(tab);
                if (tab === "history" && !historyLoaded) loadHistory();
            };

            const reset = () => { setFile(null); setPreview(null); setResult(null); setError(null); };

            const isPneumonia = result?.prediction === "PNEUMONIA";

            return (
                <div style={{
                    minHeight: "100vh",
                    background: "#fafafa",
                    fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif",
                    color: "#1a1a1a",
                }}>
                    {/* Header */}
                    <header style={{
                        background: "#fff",
                        borderBottom: "1px solid #ebebeb",
                        padding: "0 40px",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        height: 64,
                        position: "sticky", top: 0, zIndex: 100,
                    }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <div style={{
                                width: 32, height: 32, borderRadius: 8,
                                background: "linear-gradient(135deg, #1a1a1a 0%, #444 100%)",
                                display: "flex", alignItems: "center", justifyContent: "center",
                            }}>
                                <span style={{ fontSize: 16 }}>🫁</span>
                            </div>
                            <span style={{ fontWeight: 700, fontSize: 16, letterSpacing: "-0.02em" }}>PneumoScan</span>
                            <span style={{
                                fontSize: 10, fontWeight: 600, letterSpacing: "0.1em",
                                background: "#f0f0f0", color: "#666", padding: "2px 7px", borderRadius: 20,
                                textTransform: "uppercase",
                            }}>AI</span>
                        </div>
                        <nav style={{ display: "flex", gap: 4 }}>
                            {["scan", "history"].map(tab => (
                                <button key={tab} onClick={() => switchTab(tab)} style={{
                                    padding: "6px 16px", border: "none", cursor: "pointer",
                                    borderRadius: 8, fontFamily: "inherit", fontWeight: 500, fontSize: 14,
                                    background: activeTab === tab ? "#1a1a1a" : "transparent",
                                    color: activeTab === tab ? "#fff" : "#888",
                                    transition: "all 0.2s",
                                    textTransform: "capitalize",
                                }}>{tab}</button>
                            ))}
                        </nav>
                    </header>

                    <main style={{ maxWidth: 760, margin: "0 auto", padding: "48px 24px" }}>
                        {/* ── SCAN TAB ── */}
                        {activeTab === "scan" && (
                            <div>
                                <div style={{ marginBottom: 36 }}>
                                    <h1 style={{ fontSize: 32, fontWeight: 700, letterSpacing: "-0.03em", marginBottom: 8 }}>
                                        Chest X-Ray Analysis
                                    </h1>
                                    <p style={{ color: "#888", fontSize: 15, fontWeight: 400 }}>
                                        Upload a chest X-ray image to detect pneumonia using deep learning.
                                    </p>
                                </div>

                                {/* Drop zone */}
                                {!preview && (
                                    <div
                                        onClick={() => inputRef.current.click()}
                                        onDrop={onDrop}
                                        onDragOver={onDragOver}
                                        onDragLeave={onDragLeave}
                                        style={{
                                            border: `2px dashed ${dragging ? "#1a1a1a" : "#ddd"}`,
                                            borderRadius: 16,
                                            padding: "60px 40px",
                                            textAlign: "center",
                                            cursor: "pointer",
                                            background: dragging ? "#f8f8f8" : "#fff",
                                            transition: "all 0.2s",
                                            marginBottom: 24,
                                        }}>
                                        <div style={{ fontSize: 40, marginBottom: 16 }}>📤</div>
                                        <p style={{ fontWeight: 600, fontSize: 15, marginBottom: 6 }}>
                                            Drop your X-ray here
                                        </p>
                                        <p style={{ color: "#aaa", fontSize: 13 }}>
                                            or click to browse · PNG, JPG supported
                                        </p>
                                        <input ref={inputRef} type="file" accept="image/*" style={{ display: "none" }}
                                            onChange={e => handleFile(e.target.files[0])} />
                                    </div>
                                )}

                                {/* Preview */}
                                {preview && (
                                    <div style={{
                                        background: "#fff", borderRadius: 16, border: "1px solid #ebebeb",
                                        overflow: "hidden", marginBottom: 24,
                                    }}>
                                        <div style={{
                                            background: "#1a1a1a", padding: "10px 20px",
                                            display: "flex", alignItems: "center", justifyContent: "space-between"
                                        }}>
                                            <span style={{ color: "#fff", fontSize: 13, fontWeight: 500 }}>
                                                📁 {file?.name}
                                            </span>
                                            <button onClick={reset} style={{
                                                background: "rgba(255,255,255,0.1)", border: "none", color: "#fff",
                                                padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontSize: 12,
                                                fontFamily: "inherit",
                                            }}>Change</button>
                                        </div>
                                        <div style={{ background: "#000", display: "flex", justifyContent: "center" }}>
                                            <img src={preview} alt="X-ray preview"
                                                style={{ maxHeight: 360, maxWidth: "100%", objectFit: "contain" }} />
                                        </div>
                                    </div>
                                )}

                                {/* Analyze button */}
                                {preview && !result && (
                                    <button onClick={analyze} disabled={loading} style={{
                                        width: "100%", padding: "14px", border: "none", borderRadius: 12,
                                        background: loading ? "#ddd" : "#1a1a1a",
                                        color: loading ? "#999" : "#fff",
                                        fontSize: 15, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer",
                                        fontFamily: "inherit", transition: "all 0.2s",
                                        letterSpacing: "-0.01em",
                                    }}>
                                        {loading ? "Analyzing…" : "Analyze X-Ray →"}
                                    </button>
                                )}

                                {/* Error */}
                                {error && (
                                    <div style={{
                                        background: "#fff8f8", border: "1px solid #ffd5d5", borderRadius: 12,
                                        padding: "14px 18px", color: "#c0392b", fontSize: 14, marginTop: 16,
                                    }}>
                                        ⚠️ {error}
                                    </div>
                                )}

                                {/* Result card */}
                                {result && (
                                    <div style={{
                                        background: "#fff", border: `1px solid ${isPneumonia ? "#ffd5d5" : "#d5f5e3"}`,
                                        borderRadius: 16, overflow: "hidden", marginTop: 8,
                                    }}>
                                        {/* Banner */}
                                        <div style={{
                                            background: isPneumonia ? "#c0392b" : "#27ae60",
                                            padding: "18px 24px",
                                            display: "flex", alignItems: "center", justifyContent: "space-between",
                                        }}>
                                            <div>
                                                <div style={{
                                                    color: "rgba(255,255,255,0.75)", fontSize: 12, fontWeight: 600,
                                                    letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4
                                                }}>
                                                    Diagnosis
                                                </div>
                                                <div style={{ color: "#fff", fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>
                                                    {isPneumonia ? "⚠️ Pneumonia Detected" : "✅ Normal"}
                                                </div>
                                            </div>
                                            <div style={{
                                                background: "rgba(255,255,255,0.15)", borderRadius: 12,
                                                padding: "6px 14px", color: "#fff", fontSize: 13, fontWeight: 600,
                                            }}>
                                                {result.status}
                                            </div>
                                        </div>

                                        {/* Body */}
                                        <div style={{ padding: "28px 24px" }}>
                                            <div style={{ display: "flex", gap: 32, justifyContent: "center", marginBottom: 24 }}>
                                                <ConfidenceRing
                                                    value={result.confidence}
                                                    label="Confidence"
                                                    color={isPneumonia ? "#c0392b" : "#27ae60"}
                                                />
                                                <ConfidenceRing
                                                    value={Math.round(100 - result.confidence)}
                                                    label={isPneumonia ? "Normal prob." : "Pneumonia prob."}
                                                    color="#ddd"
                                                />
                                            </div>

                                            {isPneumonia && (
                                                <div style={{
                                                    background: "#fffbf0", border: "1px solid #ffe9a0", borderRadius: 10,
                                                    padding: "12px 16px", fontSize: 13, color: "#7d6608",
                                                }}>
                                                    <strong>⚕️ Reminder:</strong> This is an AI-assisted screening tool.
                                                    Please consult a licensed radiologist or physician for a clinical diagnosis.
                                                </div>
                                            )}

                                            <div style={{
                                                marginTop: 20, display: "flex", justifyContent: "space-between",
                                                alignItems: "center", paddingTop: 20, borderTop: "1px solid #f0f0f0",
                                            }}>
                                                <span style={{ fontSize: 12, color: "#aaa", fontFamily: "'DM Mono', monospace" }}>
                                                    {formatDate(result.timestamp)}
                                                </span>
                                                <button onClick={reset} style={{
                                                    border: "1px solid #ddd", background: "#fff", padding: "7px 16px",
                                                    borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "inherit",
                                                    fontWeight: 500, color: "#555",
                                                }}>Scan another →</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── HISTORY TAB ── */}
                        {activeTab === "history" && (
                            <div>
                                <div style={{ marginBottom: 32, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
                                    <div>
                                        <h1 style={{ fontSize: 32, fontWeight: 700, letterSpacing: "-0.03em", marginBottom: 8 }}>
                                            Scan History
                                        </h1>
                                        <p style={{ color: "#888", fontSize: 15 }}>
                                            {history.length} scan{history.length !== 1 ? "s" : ""} recorded
                                        </p>
                                    </div>
                                    <button onClick={loadHistory} style={{
                                        border: "1px solid #ddd", background: "#fff", padding: "8px 16px",
                                        borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "inherit",
                                        fontWeight: 500, color: "#555",
                                    }}>↻ Refresh</button>
                                </div>

                                {history.length === 0 ? (
                                    <div style={{
                                        background: "#fff", border: "1px solid #ebebeb", borderRadius: 16,
                                        padding: "60px 40px", textAlign: "center",
                                    }}>
                                        <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
                                        <p style={{ fontWeight: 600, color: "#555" }}>No scans yet</p>
                                        <p style={{ color: "#aaa", fontSize: 13 }}>Your analysis history will appear here.</p>
                                    </div>
                                ) : (
                                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                        {history.map(scan => (
                                            <div key={scan.id} style={{
                                                background: "#fff", border: "1px solid #ebebeb", borderRadius: 14,
                                                padding: "16px 20px", display: "flex", alignItems: "center", gap: 16,
                                            }}>
                                                <div style={{
                                                    width: 40, height: 40, borderRadius: 10, flexShrink: 0,
                                                    background: scan.prediction === "PNEUMONIA" ? "#fdecea" : "#eafaf1",
                                                    display: "flex", alignItems: "center", justifyContent: "center",
                                                    fontSize: 18,
                                                }}>
                                                    {scan.prediction === "PNEUMONIA" ? "⚠️" : "✅"}
                                                </div>
                                                <div style={{ flex: 1, minWidth: 0 }}>
                                                    <div style={{
                                                        fontWeight: 600, fontSize: 14, marginBottom: 2,
                                                        overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                                                    }}>
                                                        {scan.filename}
                                                    </div>
                                                    <div style={{ fontSize: 12, color: "#aaa", fontFamily: "'DM Mono', monospace" }}>
                                                        {formatDate(scan.timestamp)}
                                                    </div>
                                                </div>
                                                <div style={{ textAlign: "right", flexShrink: 0 }}>
                                                    <div style={{
                                                        fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 20,
                                                        background: scan.prediction === "PNEUMONIA" ? "#fdecea" : "#eafaf1",
                                                        color: scan.prediction === "PNEUMONIA" ? "#c0392b" : "#27ae60",
                                                        marginBottom: 4,
                                                    }}>
                                                        {scan.prediction}
                                                    </div>
                                                    <div style={{ fontSize: 12, color: "#aaa" }}>{scan.confidence}% conf.</div>
                                                </div>
                                                <button onClick={() => deleteRecord(scan.id)} style={{
                                                    border: "none", background: "none", cursor: "pointer",
                                                    color: "#ccc", fontSize: 16, padding: 4, flexShrink: 0,
                                                    borderRadius: 6, transition: "color 0.2s",
                                                }}
                                                    onMouseEnter={e => e.target.style.color = "#e74c3c"}
                                                    onMouseLeave={e => e.target.style.color = "#ccc"}
                                                >✕</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer style={{
                        borderTop: "1px solid #ebebeb", padding: "20px 40px",
                        display: "flex", justifyContent: "center",
                        fontSize: 12, color: "#bbb",
                    }}>
                        PneumoScan · AI-assisted screening · Not a substitute for professional medical advice
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
